name: Build Pokemon Emerald ROM

on: 
  push: 
    branches: [ main ]
  pull_request: 
    branches: [ main ]

jobs: 
  build: 
    runs-on: ubuntu-latest
    
    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils-arm-none-eabi \
            git \
            libpng-dev \
            perl

      - name: Build agbcc
        run: |
          git clone https://github.com/pret/agbcc.git
          cd agbcc
          ./build.sh
          ./install.sh ../

      - name: Build ROM (classic)
        run: make -j$(nproc)

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with: 
          name: pokemon-emerald-build
          path: |
            pokeemerald.gba
            pokeemerald.elf
            pokeemerald.map
          retention-days: 90

      - name: Verify ROM checksum
        run: make compare
